<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ForgeTaRoute – Page introuvable</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0B1829;--navy-mid:#132338;--navy-lt:#1C3252;
      --orange:#F26522;--orange-lt:#FF8A4C;
      --steel:#8FA3B8;--steel-lt:#C4D4E2;--white:#F0F4F8;
      --display:'Barlow Condensed',sans-serif;
      --body:'Barlow',sans-serif;
      --mono:'JetBrains Mono',monospace;
    }
    body{
      background:var(--navy);color:var(--white);
      font-family:var(--body);min-height:100vh;
      display:flex;flex-direction:column;
    }

    /* NAV */
    nav{
      padding:0 40px;height:64px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(143,163,184,.1);
    }
    .nav-logo{
      font-family:var(--display);font-size:22px;font-weight:800;
      letter-spacing:.04em;text-transform:uppercase;
      display:flex;align-items:center;gap:10px;
      text-decoration:none;color:inherit;
    }
    .nav-logo .accent{color:var(--orange)}
    .logo-icon{
      width:32px;height:32px;background:var(--orange);
      border-radius:6px;display:flex;align-items:center;justify-content:center;
    }

    /* MAIN */
    main{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:40px 20px;text-align:center;
      position:relative;overflow:hidden;
    }

    /* Fond décoratif */
    main::before{
      content:'404';
      position:absolute;
      font-family:var(--display);font-size:400px;font-weight:800;
      color:rgba(242,101,34,.04);
      letter-spacing:-.02em;
      top:50%;left:50%;transform:translate(-50%,-50%);
      pointer-events:none;white-space:nowrap;
    }

    .content{position:relative;z-index:1;max-width:520px}

    .tag{
      font-family:var(--mono);font-size:11px;letter-spacing:.14em;
      text-transform:uppercase;color:var(--orange);
      margin-bottom:16px;
    }

    .code{
      font-family:var(--display);font-size:120px;font-weight:800;
      line-height:1;letter-spacing:-.02em;
      background:linear-gradient(135deg,var(--orange),var(--orange-lt));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:8px;
    }

    h1{
      font-family:var(--display);font-size:32px;font-weight:800;
      text-transform:uppercase;letter-spacing:.04em;
      color:var(--white);margin-bottom:16px;
    }

    p{
      font-size:15px;color:var(--steel);line-height:1.7;
      margin-bottom:36px;
    }

    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

    .btn{
      font-family:var(--display);font-size:13px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;
      padding:12px 28px;border-radius:4px;
      text-decoration:none;transition:all .2s;
      cursor:pointer;border:none;
    }
    .btn-primary{background:var(--orange);color:white;}
    .btn-primary:hover{background:var(--orange-lt);}
    .btn-ghost{
      background:none;color:var(--steel-lt);
      border:1px solid rgba(143,163,184,.2);
    }
    .btn-ghost:hover{background:var(--navy-lt);color:var(--white);}

    .links{
      margin-top:48px;padding-top:32px;
      border-top:1px solid rgba(143,163,184,.08);
    }
    .links p{font-size:13px;color:var(--steel);margin-bottom:16px;}
    .links-grid{
      display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    }
    .quick-link{
      font-family:var(--mono);font-size:11px;letter-spacing:.06em;
      padding:8px 16px;border-radius:3px;
      background:rgba(143,163,184,.06);
      border:1px solid rgba(143,163,184,.1);
      color:var(--steel-lt);text-decoration:none;
      transition:all .2s;
    }
    .quick-link:hover{
      background:rgba(242,101,34,.08);
      border-color:rgba(242,101,34,.3);
      color:var(--orange-lt);
    }

    @media(max-width:600px){
      nav{padding:0 20px;}
      .code{font-size:80px;}
      h1{font-size:24px;}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="8" width="16" height="3" rx="1.5" fill="white"/>
        <rect x="3" y="4" width="12" height="3" rx="1.5" fill="white" opacity=".6"/>
        <rect x="3" y="11" width="12" height="3" rx="1.5" fill="white" opacity=".6"/>
        <circle cx="5" cy="15" r="2" fill="white"/>
        <circle cx="13" cy="15" r="2" fill="white"/>
      </svg>
    </div>
    Forge<span class="accent">Ta</span>Route
  </a>
</nav>

<main>
  <div class="content">
    <div class="tag">Erreur</div>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>
      Cette page n'existe pas ou a été déplacée.<br/>
      Pas de panique — votre progression est bien sauvegardée !
    </p>
    <div class="btns">
      <a href="index.html" class="btn btn-primary">← Retour à l'accueil</a>
      <a href="entrainement.html" class="btn btn-ghost">S'entraîner</a>
    </div>

    <div class="links">
      <p>Ou accédez directement à :</p>
      <div class="links-grid">
        <a href="entrainement.html" class="quick-link">⚡ Entraînement</a>
        <a href="examen-blanc.html" class="quick-link">📝 Examen blanc</a>
        <a href="dashboard.html" class="quick-link">📊 Dashboard</a>
        <a href="abonnement.html" class="quick-link">💎 Abonnement</a>
        <a href="auth.html" class="quick-link">🔐 Connexion</a>
      </div>
    </div>
  </div>
</main>

</body>
</html>
